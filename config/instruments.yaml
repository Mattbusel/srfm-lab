# ─────────────────────────────────────────────────────────────────────────────
# Correlation groups (used for portfolio risk aggregation)
# Instruments in the same group have higher BH activation correlation.
# ─────────────────────────────────────────────────────────────────────────────
correlation_groups:
  equity_us:
    description: "US equity indices (ES, NQ, YM). High BH co-occurrence (~0.65)."
    expected_corr: 0.65
  energy:
    description: "Energy commodities (CL, NG). Semi-independent BH events (~0.25)."
    expected_corr: 0.25
  metals:
    description: "Precious metals (GC, SI). Often counter-equity BH events (~0.20)."
    expected_corr: 0.20
  bonds_us:
    description: "US Treasuries (ZB, ZN). Low BH correlation to equities (~0.08)."
    expected_corr: 0.08
  volatility:
    description: "VIX products. Structurally uncorrelated to all other groups (~0.15)."
    expected_corr: 0.15
  crypto_large:
    description: "BTC, ETH. High intra-group correlation (~0.72)."
    expected_corr: 0.72
  crypto_mid:
    description: "SOL, XRP, AVAX, LINK. Moderately correlated (~0.55)."
    expected_corr: 0.55
  crypto_small:
    description: "DOGE, SHIB, etc. High noise. Use with caution."
    expected_corr: 0.50
  crypto_defi:
    description: "UNI, AAVE, CRV, SUSHI. DeFi sector correlation (~0.60)."
    expected_corr: 0.60
  forex_majors:
    description: "Major FX pairs. Low correlation to other asset classes."
    expected_corr: 0.40
