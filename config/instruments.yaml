# instruments.yaml — SRFM Lab Instrument Universe
# Full configuration for all tradeable instruments.
# CF values are calibrated to ~1 sigma of returns per timeframe.
# bh_form is the mass threshold at which a BH forms (default 1.5).
# bh_collapse is the mass level at which the BH dissolves (default 1.0).
# bh_decay is the per-bar mass decay multiplier (default 0.95).
---

instruments:

  # ── Equity Indices ────────────────────────────────────────────────────────
  ES:
    name: "S&P 500 E-mini Futures (via SPY)"
    asset_class: equity_index
    base_currency: USD
    quote_currency: USD
    alpaca_ticker: SPY
    type: stock
    tick_size: 0.01
    lot_size: 1.0
    margin_rate: 0.0
    cf_15m: 0.00030
    cf_1h:  0.00100
    cf_1d:  0.00500
    bh_form: 1.5
    bh_collapse: 1.0
    bh_decay: 0.95
    corr_group: equity_us
    is_active: true
    notes: "Core equity index. Proxy via SPY ETF on Alpaca."

