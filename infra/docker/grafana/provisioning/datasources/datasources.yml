apiVersion: 1
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    uid: DS_PROMETHEUS

  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    uid: DS_INFLUXDB
    jsonData:
      version: Flux
      organization: srfm
      defaultBucket: market_data
    secureJsonData:
      token: ${INFLUX_TOKEN:-srfm-dev-token}
