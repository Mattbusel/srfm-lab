apiVersion: 1

# ──────────────────────────────────────────────────────────────────────────────
# Grafana dashboard provisioning
# Dashboards are loaded from /var/lib/grafana/dashboards (mounted from ./dashboards/)
# ──────────────────────────────────────────────────────────────────────────────

providers:
  - name: LARSA Dashboards
    orgId: 1
    folder: LARSA
    folderUid: larsa-folder
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
