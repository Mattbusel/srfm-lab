apiVersion: 1

# ──────────────────────────────────────────────────────────────────────────────
# Grafana datasource provisioning — InfluxDB v2 (Flux query language)
# ──────────────────────────────────────────────────────────────────────────────

datasources:

  - name: InfluxDB
    uid: larsa-influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    editable: false
    jsonData:
      version: Flux
      organization: srfm
      defaultBucket: larsa_metrics
      tlsSkipVerify: true
    secureJsonData:
      token: larsa-super-secret-token

  # Prometheus datasource — points at the Prometheus container
  - name: Prometheus
    uid: larsa-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: false
    editable: false
    jsonData:
      httpMethod: POST
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "2.51.0"
      cacheLevel: "Low"
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
