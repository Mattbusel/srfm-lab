global:
  scrape_interval:     15s
  evaluation_interval: 15s
  scrape_timeout:      10s
  external_labels:
    monitor: 'larsa-live-trader'

# Alertmanager — not configured yet; add here when ready
alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  # ── LARSA metrics_server ───────────────────────────────────────────────────
  - job_name: 'larsa_metrics_server'
    static_configs:
      - targets: ['host.docker.internal:9090']
    metrics_path: /metrics
    scrape_interval: 15s

  # ── Self-monitoring ────────────────────────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ── InfluxDB internal metrics ──────────────────────────────────────────────
  - job_name: 'influxdb'
    static_configs:
      - targets: ['influxdb:8086']
    metrics_path: /metrics
    scrape_interval: 30s
