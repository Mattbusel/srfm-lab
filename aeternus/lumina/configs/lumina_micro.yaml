# Lumina-Micro configuration: ~1M parameters
model:
  name: LuminaMicro
  n_features: 64
  d_model: 128
  n_heads: 4
  n_layers: 4
  d_ff: 512
  n_outputs: 5
  dropout: 0.1
  max_seq_len: 512

training:
  batch_size: 256
  learning_rate: 3.0e-4
  weight_decay: 0.01
  max_steps: 50000
  warmup_steps: 1000
  gradient_clip_norm: 1.0
  mixed_precision: fp16
  eval_every: 500
  save_every: 1000

data:
  train_start: "2010-01-01"
  train_end: "2020-12-31"
  val_start: "2021-01-01"
  val_end: "2021-12-31"
  test_start: "2022-01-01"
  test_end: "2023-12-31"
  n_assets: 500
  features: ["price", "volume", "returns_1d", "returns_5d", "volatility_20d"]
  normalize: true
  fill_missing: zero

scheduler:
  type: cosine_warmup
  min_lr_ratio: 0.1

optimizer:
  type: adamw
  betas: [0.9, 0.95]
  eps: 1.0e-8

logging:
  project: lumina
  name: lumina_micro_v1
  tags: ["micro", "baseline"]
  log_every: 10

output:
  checkpoint_dir: checkpoints/lumina_micro
  export_onnx: false
  export_torchscript: false
